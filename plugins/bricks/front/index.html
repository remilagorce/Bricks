<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bricks</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2210%22 y=%2210%22 width=%2280%22 height=%2280%22 rx=%2214%22 fill=%22%23ff5722%22/></svg>" />
<style>
  :root, :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #121212;
    --card: #171717;
    --border: #2a2a2a;
    --border-soft: #222222;
    --border-strong: #333333;
    --hover: #1c1c1c;
    --text: #dddddd;
    --text-dim: #888888;
    --text-faint: #666666;
    --accent: #ff5722;
    --accent-soft: rgba(255, 87, 34, .12);
    --danger: #ef4444;
    --radius: 12px;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #f4f4f2;
    --card: #ffffff;
    --border: #e3e3df;
    --border-soft: #ededea;
    --border-strong: #d6d6d0;
    --hover: #f0f0ec;
    --text: #1d1d1b;
    --text-dim: #6b6b66;
    --text-faint: #9a9a93;
    --accent: #ff5722;
    --accent-soft: rgba(255, 87, 34, .10);
    --danger: #dc2626;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.45 "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; }

  .app { display: flex; flex-direction: column; height: 100%; }

  /* ---- top bar ---- */
  .topbar {
    display: flex; align-items: center; gap: 14px;
    height: 54px; padding: 0 20px;
    background: var(--card); border-bottom: 1px solid var(--border);
    flex: none;
  }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; letter-spacing: -0.01em; color: var(--text); }
  .brand .logo { color: var(--accent); font-size: 15px; }
  .topbar .sep { width: 1px; height: 22px; background: var(--border); flex: none; }
  .topbar .spacer { flex: 1; }
  .meta { font-size: 12px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text-dim); cursor: pointer; font-size: 14px;
    transition: background .12s, color .12s;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }
  .icon-btn.spinning { animation: spin .7s linear infinite; pointer-events: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- workspace switcher (pills in the header) ---- */
  .ws-bar {
    display: flex; align-items: center; gap: 6px;
    min-width: 0; overflow-x: auto; scrollbar-width: none;
  }
  .ws-bar::-webkit-scrollbar { display: none; }
  .ws-tab {
    flex: none;
    display: inline-flex; align-items: center; gap: 7px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text-dim); cursor: pointer; font-family: inherit;
    padding: 6px 13px; border-radius: 999px;
    font-size: 12.5px; font-weight: 500;
    transition: background .12s, color .12s, border-color .12s;
  }
  .ws-tab:hover { background: var(--hover); color: var(--text); }
  .ws-tab.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .ws-tab:disabled { cursor: default; }
  .ws-tab:disabled:not(.active) { opacity: .55; }
  .ws-tab .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .45; }
  .ws-tab.active .dot { background: var(--accent); opacity: 1; }
  .ws-tab.switching .dot { animation: ws-pulse .8s ease-in-out infinite; }
  @keyframes ws-pulse { 0%, 100% { opacity: .3; } 50% { opacity: 1; } }

  /* ---- tabs (test-ee style: flat, orange bar on active) ---- */
  .tabs { display: flex; align-items: center; gap: 2px; padding: 8px 20px 0; flex: none; }
  .tab {
    border: none; background: none;
    padding: 9px 15px; border-radius: 0;
    border-bottom: 2px solid transparent;
    font-size: 13px; font-weight: 500; color: var(--text-dim);
    cursor: pointer; transition: color .12s, border-color .12s; font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--accent); }
  .tab .count { color: var(--text-faint); font-weight: 400; margin-left: 6px; font-variant-numeric: tabular-nums; }

  /* ---- table card ---- */
  .table-zone { flex: 1; min-height: 0; padding: 12px 20px 20px; display: flex; flex-direction: column; }
  .card {
    flex: 1; min-height: 0; display: flex; flex-direction: column;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: 0 1px 3px rgba(0, 0, 0, .3), 0 8px 24px -12px rgba(0, 0, 0, .4);
    overflow: hidden;
  }
  .grid-scroll { flex: 1; overflow: auto; }
  table { border-collapse: separate; border-spacing: 0; min-width: 100%; }
  thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--hover); text-align: left;
    font-size: 11.5px; font-weight: 600; letter-spacing: .03em; text-transform: none;
    color: var(--text-dim);
    padding: 0 14px; height: 38px; vertical-align: middle;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th .type-ico { color: var(--text-faint); font-weight: 500; margin-right: 7px; font-size: 11px; }
  tbody td {
    padding: 0 14px; height: 40px; vertical-align: middle;
    font-size: 13px;
    border-bottom: 1px solid var(--border-soft);
    white-space: nowrap; max-width: 340px; overflow: hidden; text-overflow: ellipsis;
  }
  tbody tr { transition: background .08s; }
  tbody tr:hover { background: var(--hover); }
  tbody tr.selected { background: var(--accent-soft); }
  tbody tr.selected td { border-bottom-color: rgba(255, 87, 34, .25); }

  th.col-check, td.col-check { width: 40px; min-width: 40px; padding: 0 0 0 14px; }
  th.col-num, td.col-num { width: 44px; min-width: 44px; text-align: right; padding-right: 10px; }
  td.col-num { color: var(--text-faint); font-size: 11.5px; font-variant-numeric: tabular-nums; }
  input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer;
    display: block;
  }

  .cell-empty { color: var(--text-faint); }
  a.cell-link {
    color: #ff8a65; text-decoration: none;
    background: var(--accent-soft); border-radius: 6px; padding: 3px 8px;
    font-size: 12.5px; font-weight: 500;
  }
  a.cell-link:hover { text-decoration: underline; }
  .cell-num { font-variant-numeric: tabular-nums; }

  /* ---- status chips (test-ee vocabulary) ---- */
  .chip {
    display: inline-block; padding: 1px 8px; border-radius: 999px;
    font-size: 11px; background: #26262b; color: #9ca3af;
  }
  .s-pending { background: #26262b; color: #9ca3af; }
  .s-running { background: #3a2b0a; color: #fbbf24; }
  .s-done, .s-approved { background: #0d2f1b; color: #4ade80; }
  .s-failed { background: #3b0d0d; color: #f87171; }
  .s-not_found { background: #26262b; color: #6b7280; }
  .s-disqualified { background: #3b0d0d; color: #ef4444; }
  .s-draft { background: #12233f; color: #60a5fa; }
  .s-sent { background: #0d2f2b; color: #2dd4bf; }
  .s-new { background: #26262b; color: #9ca3af; }

  .card-footer {
    flex: none; display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-top: 1px solid var(--border-soft);
    font-size: 12px; color: var(--text-faint); font-variant-numeric: tabular-nums;
  }

  /* ---- floating action bar ---- */
  .action-bar {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 14px;
    background: #1c1c1c; color: #fff;
    border: 1px solid #333;
    padding: 10px 10px 10px 20px; border-radius: 999px;
    box-shadow: 0 12px 32px -8px rgba(0, 0, 0, .6);
    animation: rise .18s ease-out;
    z-index: 10;
  }
  @keyframes rise { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .action-bar .sel-count { font-size: 13px; font-weight: 500; }
  .action-bar .link-btn {
    background: none; border: none; color: #888; font-size: 12.5px;
    cursor: pointer; font-family: inherit; padding: 0;
  }
  .action-bar .link-btn:hover { color: #fff; }
  .btn-danger {
    border: none; cursor: pointer; font-family: inherit;
    background: var(--danger); color: #fff;
    font-size: 13px; font-weight: 600;
    padding: 9px 18px; border-radius: 999px;
    transition: background .12s;
  }
  .btn-danger:hover { background: #dc2626; }
  .btn-danger:disabled { opacity: .6; cursor: default; }

  /* ---- states ---- */
  .state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-dim); }
  .state .big { font-size: 34px; }
  .state .title { font-weight: 600; color: var(--text); font-size: 15px; }
  .state code { background: var(--hover); border: 1px solid var(--border-strong); border-radius: 6px; padding: 2px 8px; font-size: 12.5px; }
  .error-banner {
    margin: 12px 20px 0; padding: 10px 16px;
    background: #3b0d0d; border: 1px solid #5c1a1a; border-radius: 10px;
    color: #f87171; font-size: 13px;
  }

  /* ---- export button + modal ---- */
  .btn-export {
    display: inline-flex; align-items: center; gap: 6px;
    height: 30px; padding: 0 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500;
    font-family: inherit; transition: background .12s, border-color .12s;
  }
  .btn-export:hover { background: var(--hover); border-color: var(--border-strong); }
  .btn-export:disabled { opacity: .5; cursor: default; }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0, 0, 0, .55);
    display: flex; align-items: center; justify-content: center;
    animation: fade .12s ease-out;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: 400px; max-width: calc(100vw - 40px);
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 20px 60px -12px rgba(0, 0, 0, .7);
    padding: 20px; animation: rise2 .15s ease-out;
  }
  @keyframes rise2 { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .modal-head h3 { margin: 0; font-size: 15px; font-weight: 600; color: var(--text); }
  .modal-sub { margin: 6px 0 16px; font-size: 12.5px; color: var(--text-dim); }
  .export-opts { display: flex; gap: 12px; }
  .export-opt {
    flex: 1; display: flex; flex-direction: column; gap: 4px;
    padding: 16px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--hover);
    cursor: pointer; font-family: inherit; text-align: left;
    transition: border-color .12s, background .12s;
  }
  .export-opt:hover { border-color: var(--accent); background: var(--accent-soft); }
  .export-opt:disabled { opacity: .6; cursor: default; }
  .export-opt .fmt { font-size: 15px; font-weight: 600; color: var(--text); }
  .export-opt .fmt-desc { font-size: 11.5px; color: var(--text-dim); }

  /* ---- layout: sidebar + main ---- */
  .main { flex: 1; min-height: 0; display: flex; }
  .content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .sidebar {
    flex: none; width: 210px;
    background: var(--card); border-right: 1px solid var(--border);
    padding: 12px 10px; display: flex; flex-direction: column; gap: 2px;
  }
  .sidebar.closed { display: none; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    border: none; background: none; width: 100%;
    padding: 9px 12px; border-radius: 8px;
    font-size: 13px; font-weight: 500; color: var(--text-dim);
    cursor: pointer; font-family: inherit; text-align: left;
    transition: background .12s, color .12s;
  }
  .nav-item:hover { background: var(--hover); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .nav-item .nav-ico { width: 18px; text-align: center; font-size: 14px; }

  /* ---- page (campaigns / settings) ---- */
  .page { flex: 1; min-height: 0; overflow: auto; padding: 20px; }
  .page-inner { max-width: 960px; margin: 0 auto; }
  .page-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .page-head h2 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .page-head .spacer { flex: 1; }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 7px;
    height: 32px; padding: 0 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500;
    font-family: inherit; transition: background .12s, border-color .12s;
  }
  .btn-ghost:hover { background: var(--hover); border-color: var(--border-strong); }
  .btn-accent {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    border: none; cursor: pointer; font-family: inherit;
    background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 600;
    height: 34px; padding: 0 18px; border-radius: 8px;
    transition: filter .12s;
  }
  .btn-accent:hover { filter: brightness(1.08); }
  .btn-plus {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    border: none; background: var(--accent); color: #fff;
    font-size: 18px; line-height: 1; cursor: pointer;
    transition: filter .12s;
  }
  .btn-plus:hover { filter: brightness(1.08); }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    border: none; background: none; padding: 0;
    color: var(--text-dim); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
  }
  .back-btn:hover { color: var(--text); }

  /* ---- campaigns list ---- */
  .campaign-list { display: flex; flex-direction: column; gap: 8px; }
  .campaign-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .campaign-row:hover { border-color: var(--border-strong); background: var(--hover); }
  .campaign-row .c-name { font-size: 14px; font-weight: 600; }
  .campaign-row .c-meta { font-size: 12px; color: var(--text-faint); margin-left: auto; font-variant-numeric: tabular-nums; }
  .empty-campaigns {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 70px 20px; color: var(--text-dim);
    border: 1px dashed var(--border-strong); border-radius: var(--radius);
  }
  .empty-campaigns .big { font-size: 30px; }

  /* ---- settings form ---- */
  .form-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: 0 1px 3px rgba(0, 0, 0, .2);
    padding: 22px 24px;
  }
  .form-card-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
  .form-card-head .fc-ico {
    width: 36px; height: 36px; border-radius: 9px; flex: none;
    background: var(--accent-soft); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .form-card-head h3 { margin: 0; font-size: 16px; font-weight: 600; }
  .form-card-head .fc-summary { margin-left: auto; text-align: right; font-size: 11.5px; color: var(--text-faint); line-height: 1.6; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 22px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .field input[type="text"], .field select {
    height: 38px; padding: 0 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; transition: border-color .12s; width: 100%;
  }
  .field input[type="text"]:focus, .field select:focus { border-color: var(--accent); }
  .input-wrap { position: relative; }
  .input-wrap input { padding-right: 105px !important; }
  .input-wrap .suffix {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 11.5px; color: var(--accent); pointer-events: none;
  }
  .check-row { display: flex; flex-wrap: wrap; gap: 14px 18px; align-items: center; }
  .check-item {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 13px; color: var(--text); cursor: pointer; user-select: none;
  }
  .check-item.off { color: var(--text-faint); }
  .hours-row { display: flex; gap: 16px; }
  .hours-row .field { flex: 1; }
  .form-section { margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--border-soft); }
  .form-section .sec-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .form-actions { margin-top: 24px; }

  /* ---- accordion sections (campaign page) ---- */
  .acc {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: 0 1px 3px rgba(0, 0, 0, .2); margin-bottom: 14px;
  }
  .acc-head { display: flex; align-items: center; gap: 14px; padding: 15px 20px; cursor: pointer; user-select: none; }
  .acc-ico {
    width: 38px; height: 38px; border-radius: 9px; flex: none;
    display: inline-flex; align-items: center; justify-content: center; font-size: 17px;
  }
  .acc-ico.orange { background: var(--accent-soft); color: var(--accent); }
  .acc-ico.yellow { background: rgba(245, 158, 11, .14); color: #f59e0b; }
  .acc-ico.green  { background: rgba(34, 197, 94, .14); color: #22c55e; }
  .acc-title { font-size: 15px; font-weight: 600; }
  .acc-summary { margin-left: auto; text-align: right; font-size: 11.5px; color: var(--text-faint); line-height: 1.6; max-width: 380px; }
  .acc-chevron { flex: none; color: var(--text-dim); font-size: 12px; transition: transform .15s; }
  .acc.open .acc-chevron { transform: rotate(180deg); }
  .acc-body { border-top: 1px solid var(--border-soft); padding: 20px; }

  /* ---- switch toggle ---- */
  .switch { position: relative; display: inline-block; width: 36px; height: 20px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .switch .track { position: absolute; inset: 0; border-radius: 999px; background: var(--border-strong); transition: background .15s; }
  .switch .track::after {
    content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    border-radius: 50%; background: #fff; transition: transform .15s;
    box-shadow: 0 1px 2px rgba(0, 0, 0, .3);
  }
  .switch input:checked + .track { background: var(--accent); }
  .switch input:checked + .track::after { transform: translateX(16px); }

  /* ---- mail d'envoi section ---- */
  .mail-center { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
  .mail-toggle-row { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; }
  .mail-hint { font-size: 12px; color: var(--text-dim); }
  .mail-select { min-width: 280px; height: 38px; padding: 0 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-size: 13px; font-family: inherit; outline: none; margin-top: 8px; }
  .mail-select:focus { border-color: var(--accent); }
  .ou-divider { font-size: 13px; font-weight: 700; margin: 12px 0 2px; }
  .connect-title { font-size: 13.5px; font-weight: 700; }
  .provider-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; width: 100%; margin-top: 12px; }
  .provider-card {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    padding: 22px 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg); cursor: pointer; font-family: inherit;
    font-size: 12.5px; line-height: 1.4; color: var(--text); text-align: center;
    transition: border-color .12s, background .12s;
  }
  .provider-card:hover { border-color: var(--accent); background: var(--accent-soft); }
  .provider-card .p-ico { font-size: 22px; font-weight: 700; line-height: 1; }

  /* ---- contacts section ---- */
  .contacts-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .link-action {
    background: none; border: none; padding: 0;
    color: var(--accent); font-size: 12.5px; font-weight: 500;
    cursor: pointer; font-family: inherit; opacity: .6; transition: opacity .12s;
  }
  .link-action:hover { opacity: 1; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap input {
    width: 100%; height: 36px; padding: 0 34px 0 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-size: 13px; font-family: inherit; outline: none; transition: border-color .12s;
  }
  .search-wrap input:focus { border-color: var(--accent); }

<script type="module">

const html = htm.bind(React.createElement);

async function api(path, options) {
  const res = await fetch(path, options);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `${res.status} ${res.statusText}`);
  return data;
}

function toCSV(headers, rows) {
  const esc = (v) => {
    const s = String(v ?? "");
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  return [headers, ...rows].map(row => row.map(esc).join(",")).join("\r\n");
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

const RE_URL = /^https?:\/\/\S+$/i;
const RE_EMAIL = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
const RE_DOMAIN = /^[a-z0-9-]+(\.[a-z0-9-]+)+$/i;
const RE_NUM = /^-?\d+([.,]\d+)?$/;

function columnType(header, values) {
  // Status columns follow the shared vocabulary (CONVENTIONS §5) and render as chips.
  if (header === "status" || header.endsWith("_status")) return "status";
  const sample = values.filter(v => v !== "").slice(0, 20);
  if (!sample.length) return "text";
  if (sample.every(v => RE_NUM.test(v))) return "number";
  if (sample.every(v => RE_EMAIL.test(v))) return "email";
  if (sample.every(v => RE_URL.test(v) || RE_DOMAIN.test(v))) return "link";
  return "text";
}
const TYPE_ICON = { text: "Aa", number: "#", email: "@", link: "\u{1F517}", status: "●" };

function Cell({ value, type }) {
  if (value === "") return html`<span class="cell-empty">—</span>`;
  if (type === "status") return html`<span class=${"chip s-" + value}>${value}</span>`;
  if (type === "email") return html`<a class="cell-link" href=${"mailto:" + value}>${value}</a>`;
  if (type === "link") {
    const href = RE_URL.test(value) ? value : "https://" + value;
    return html`<a class="cell-link" href=${href} target="_blank" rel="noreferrer">${value}</a>`;
  }
  if (type === "number") return html`<span class="cell-num">${value}</span>`;
  return html`<span title=${value}>${value}</span>`;
}

  const [open, setOpen] = useState({ general: true, mail: false, contacts: false, sequence: false });
  const toggleSection = (key) => setOpen(prev => ({ ...prev, [key]: !prev[key] }));

  // Mail d'envoi — front-only: no mailbox connected yet.

  // Liste de contacts — front-only: empty for now.

  // Séquence de mail.
  const [steps, setSteps] = useState([{ subject: "", body: "" }]);
  const [activeStep, setActiveStep] = useState(0);
  const [words, setWords] = useState(0);

  const countWords = (t) => (t.trim().match(/\S+/g) || []).length;

  const readEditor = () => editorRef.current ? editorRef.current.innerHTML : null;
  const saveEditor = () => {
    const body = readEditor();
    if (body === null) return;
    setSteps(prev => prev.map((s, i) => i === activeStep ? { ...s, body } : s));
  };
  const selectStep = (i) => { saveEditor(); setActiveStep(i); };
  const addStep = () => {
    saveEditor();
    setSteps(prev => [...prev, { subject: "", body: "" }]);
    setActiveStep(steps.length);
  };
  const setSubject = (v) => setSteps(prev => prev.map((s, i) => i === activeStep ? { ...s, subject: v } : s));

  // Load the active step into the (uncontrolled) editor when it appears or changes.
  useEffect(() => {
    const el = editorRef.current;
    if (!el) return;
    const body = steps[activeStep].body || "";

  const exec = (cmd, val) => (e) => {

      dailyLimit: Number(dailyLimit || 0),
      bcc, days, from, to, stopOn,
      sendingEmail: selectedEmail || null,
      multiMail,
      steps: finalSteps,
    });
  };

  const step = steps[activeStep];

  return html`

                  ${HOURS.map(h => html`<option key=${h} value=${h}>${h}</option>`)}

              </div>
            </div>
          </div>
        </div>
        <div class="form-section">

            ${STOP_CONDITIONS.map(([key, label]) => html`

          </select>
          <div class="ou-divider">OU</div>

  const [table, setTable] = useState(null);            // {headers, rows}
  const [selected, setSelected] = useState(new Set()); // 1-based row numbers
  const [confirming, setConfirming] = useState(false);

  const [exporting, setExporting] = useState(null);    // "csv" | "xlsx" while running
  const [busy, setBusy] = useState(false);
  const [switching, setSwitching] = useState(null);   // workspace name being switched to
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [updatedAt, setUpdatedAt] = useState(null);
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem("bricks-theme") || "dark"; } catch { return "dark"; }
  });
  const activeRef = useRef(active);
  activeRef.current = active;
  const allRef = useRef(null);

  const loadStatus = useCallback(async () => {
    const st = await api("/api/status");
    setStatus(st);
    const tables = st.current ? st.current.tables : [];
    if (tables.length && !tables.includes(activeRef.current)) setActive(tables[0]);
    if (!tables.length) { setActive(null); setTable(null); }
    return st;
  }, []);

  const loadTable = useCallback(async (name, { silent } = {}) => {
    if (!name) return;
    if (!silent) setLoading(true);
    try {
      const data = await api("/api/table/" + encodeURIComponent(name));
      setTable(data);
      // Prune selected ids that no longer exist (row deleted by a skill).
      const idc = data.headers.indexOf("_id");
      setSelected(prev => {
        if (!prev.size) return prev;
        const alive = new Set(idc >= 0 ? data.rows.map(r => r[idc]) : []);
        const next = new Set([...prev].filter(id => alive.has(id)));
        return next.size === prev.size ? prev : next;
      });
      setUpdatedAt(new Date());
      setError(null);
    } finally {
      setLoading(false);
    }
  }, []);

  const refresh = useCallback(async (silent = false) => {
    try {
      const st = await loadStatus();
      const tables = st.current ? st.current.tables : [];
      const name = tables.includes(activeRef.current) ? activeRef.current : tables[0];
      if (name) await loadTable(name, { silent });
      setError(null);
    } catch (e) {
      setError(e.message);
    }
  }, [loadStatus, loadTable]);

  const switchWorkspace = useCallback(async (name) => {
    if (switching || (status && name === status.currentWorkspace)) return;
    setSwitching(name);
    setError(null);
    try {
      await api("/api/workspace/switch", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name }),
      });
      // The new workspace has its own tables — reset the table view fully.
      setActive(null);
      setTable(null);
      setSelected(new Set());
      setConfirming(false);
      await refresh();
    } catch (e) {
      setError(e.message);
    } finally {
      setSwitching(null);
    }
  }, [switching, status, refresh]);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem("bricks-theme", theme); } catch {}
  }, [theme]);

  useEffect(() => { refresh(); }, []);
  useEffect(() => {
    if (!active) return;
    setSelected(new Set());
    setConfirming(false);
    loadTable(active).catch(e => setError(e.message));
  }, [active]);

  // Light polling — selection is keyed by _id, so refreshing while rows are
  // selected is safe (stale ids are pruned on load, numbers may shift, ids don't).
  useEffect(() => {
    const id = setInterval(() => {
      if (!document.hidden) refresh(true);
    }, 4000);
    return () => clearInterval(id);
  }, [refresh]);

  const rows = table ? table.rows : [];
  const allHeaders = table ? table.headers : [];
  const idIdx = allHeaders.indexOf("_id");
  const canSelect = idIdx >= 0;
  // Technical columns (underscore-prefixed, e.g. _id) are never displayed.
  const cols = allHeaders.map((h, i) => ({ h, i })).filter(({ h }) => !h.startsWith("_"));
  const types = cols.map(({ h, i }) => columnType(h, rows.map(r => r[i] ?? "")));
  const allChecked = canSelect && rows.length > 0 && selected.size === rows.length;
  useEffect(() => {
    if (allRef.current) allRef.current.indeterminate = selected.size > 0 && !allChecked;
  }, [selected, allChecked]);

  const toggleRow = (id) => {
    const next = new Set(selected);
    next.has(id) ? next.delete(id) : next.add(id);
    setSelected(next);
    setConfirming(false);
  };
  const toggleAll = () => {
    setSelected(allChecked ? new Set() : new Set(rows.map(r => r[idIdx])));
    setConfirming(false);
  };

  const doDelete = async () => {
    if (!confirming) { setConfirming(true); return; }
    setBusy(true);
    try {
      await api("/api/table/" + encodeURIComponent(active) + "/remove", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids: [...selected] }),
      });
      setSelected(new Set());
      setConfirming(false);
      await refresh(true);
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  };

  const doExport = async (format) => {
    if (!table || exporting) return;
    const headers = cols.map(({ h }) => h);
    const dataRows = rows.map(r => cols.map(({ i }) => r[i] ?? ""));
    const base = (active || "export").replace(/\.csv$/, "");
    setExporting(format);
    try {
      if (format === "csv") {
        const csv = "\uFEFF" + toCSV(headers, dataRows); // BOM: Excel reads UTF-8
        downloadBlob(new Blob([csv], { type: "text/csv;charset=utf-8" }), base + ".csv");
      } else {
        const XLSX = await import("https://esm.sh/xlsx@0.18.5");
        const sheet = XLSX.utils.aoa_to_sheet([headers, ...dataRows]);
        const wb = XLSX.utils.book_new();
        const sheetName = (base.replace(/[\\/?*\[\]:]/g, "").slice(0, 31)) || "Sheet1";
        XLSX.utils.book_append_sheet(wb, sheet, sheetName);
        XLSX.writeFile(wb, base + ".xlsx");
      }
      setExportOpen(false);
    } catch (e) {
      setError("Export failed: " + e.message);
    } finally {
      setExporting(null);
    }
  };

  const current = status && status.current;
  const tables = current ? current.tables : [];

  let body;
  if (status && !status.initialized) {
    body = html`<div class="state">
      <div class="big">\u{1F9F1}</div>
      <div class="title">Bricks is not initialized here</div>
      <div>Run <code>/bricks:workspace new <name></code> in Claude Code, then refresh.</div>
    </div>`;
  } else if (status && !status.currentWorkspace) {
    body = html`<div class="state">
      <div class="big">\u{1F4C2}</div>
      <div class="title">No current workspace</div>
      <div>Create one with <code>/bricks:workspace new <name></code>.</div>
    </div>`;
  } else if (status && tables.length === 0) {
    body = html`<div class="state">
      <div class="big">\u{1FA9F}</div>
      <div class="title">No tables yet in ${status.currentWorkspace}</div>
      <div>Run <code>/bricks:find</code> to build your first list.</div>
    </div>`;
  } else if (table) {
    body = html`
      <div class="table-zone">
        <div class="card">
          <div class="grid-scroll">
            <table>
              <thead><tr>
                ${canSelect && html`<th class="col-check"><input type="checkbox" ref=${allRef} checked=${allChecked} onChange=${toggleAll} /></th>`}
                <th class="col-num"></th>
                ${cols.map(({ h }, k) => html`<th key=${h}><span class="type-ico">${TYPE_ICON[types[k]]}</span>${h}</th>`)}
              </tr></thead>
              <tbody>
                ${rows.map((r, i) => {
                  const rowId = canSelect ? r[idIdx] : null;
                  const isSel = rowId !== null && selected.has(rowId);
                  return html`<tr key=${rowId ?? i} class=${isSel ? "selected" : ""}>
                    ${canSelect && html`<td class="col-check"><input type="checkbox" checked=${isSel} onChange=${() => toggleRow(rowId)} /></td>`}
                    <td class="col-num">${i + 1}</td>
                    ${cols.map(({ i: c }, k) => html`<td key=${k}><${Cell} value=${r[c] ?? ""} type=${types[k]} /></td>`)}
                  </tr>`;
                })}
              </tbody>
            </table>
          </div>
          <div class="card-footer">
            <span>${rows.length} row${rows.length === 1 ? "" : "s"}</span><span>·</span>
            <span>${cols.length} column${cols.length === 1 ? "" : "s"}</span>
            ${updatedAt && html`<span>·</span><span>updated ${updatedAt.toLocaleTimeString()}</span>`}
          </div>
        </div>
      </div>`;
  } else {
    body = html`<div class="state"><div class="title">Loading…</div></div>`;
  }

  const dataView = html`
    ${tables.length > 0 && html`
      <div class="tabs">
        ${tables.map(t => html`
          <button key=${t} class=${"tab" + (t === active ? " active" : "")} onClick=${() => setActive(t)}>
            ${t.replace(/\.csv$/, "")}
            ${t === active && table && html`<span class="count">${table.rows.length}</span>`}
          </button>`)}
      </div>`}
    ${body}
    ${selected.size > 0 && html`
      <div class="action-bar">
        <span class="sel-count">${selected.size} row${selected.size === 1 ? "" : "s"} selected</span>
        <button class="link-btn" onClick=${() => { setSelected(new Set()); setConfirming(false); }}>Clear</button>
        <button class="btn-danger" disabled=${busy} onClick=${doDelete}>
          ${busy ? "Deleting…" : confirming ? `Confirm delete (${selected.size})` : "Delete"}
        </button>
      </div>`}`;

  let content;
  if (view === "data") {
    content = dataView;
  } else if (view === "campaigns") {
    content = html`<${CampaignsPage}
      campaigns=${campaigns}
      onNew=${() => setView("campaign-new")}
      onInfra=${() => setView("infra")} />`;
  } else if (view === "campaign-new") {
    content = html`<${CampaignSettingsPage}
      onBack=${() => setView("campaigns")}
      onSave=${(c) => { setCampaigns(prev => [...prev, c]); setView("campaigns"); }} />`;
  } else if (view === "infra") {
    content = html`
      <div class="page"><div class="page-inner">
        <div class="page-head">
          <button class="back-btn" onClick=${() => setView("campaigns")}>← Campaigns</button>
        </div>
        <div class="empty-campaigns">
          <div class="big">🛠</div>
          <div>Paramétrage infra — à venir</div>
        </div>
      </div></div>`;
  }

  return html`
    <div class="app">
      <div class="topbar">
        <button class="icon-btn" title=${sidebarOpen ? "Fermer le menu" : "Ouvrir le menu"} onClick=${() => setSidebarOpen(o => !o)}>☰</button>
        <div class="brand"><span class="logo">■</span> Bricks</div>
        ${status && status.initialized && status.workspaces && status.workspaces.length > 0 && html`
          <div class="sep"></div>
          <div class="ws-bar">
            ${status.workspaces.map(w => {
              const isCurrent = w === status.currentWorkspace;
              const isSwitching = switching === w;
              return html`<button key=${w}
                class=${"ws-tab" + (isCurrent ? " active" : "") + (isSwitching ? " switching" : "")}
                disabled=${switching !== null || isCurrent}
                title=${isCurrent ? "Workspace actuel" : "Basculer sur « " + w + " »"}
                onClick=${() => switchWorkspace(w)}>
                <span class="dot"></span>${w}
              </button>`;
            })}
          </div>
        `}
        <div class="spacer"></div>
        ${updatedAt && html`<span class="meta">synced ${updatedAt.toLocaleTimeString()}</span>`}
        ${view === "data" && table && rows.length > 0 && html`
          <button class="btn-export" title="Exporter la table" onClick=${() => setExportOpen(true)}>
            <span>⭳</span> Exporter
          </button>`}
        <button class="icon-btn" title=${theme === "dark" ? "Passer en mode clair" : "Passer en mode sombre"} onClick=${() => setTheme(t => t === "dark" ? "light" : "dark")}>${theme === "dark" ? "☀" : "☾"}</button>
        <button class=${"icon-btn" + (loading ? " spinning" : "")} title="Refresh" onClick=${() => refresh()}>↻</button>
      </div>
      ${error && html`<div class="error-banner">${error}</div>`}
      <div class="main">
        <nav class=${"sidebar" + (sidebarOpen ? "" : " closed")}>
          <button class=${"nav-item" + (view === "data" ? " active" : "")} onClick=${() => setView("data")}>
            <span class="nav-ico">▦</span> Data
          </button>
          <button class=${"nav-item" + (view !== "data" ? " active" : "")} onClick=${() => setView("campaigns")}>
            <span class="nav-ico">✉</span> Campaigns
          </button>
        </nav>
        <div class="content">
          ${content}
        </div>
      </div>
      ${exportOpen && html`
        <div class="modal-overlay" onClick=${() => !exporting && setExportOpen(false)}>
          <div class="modal" onClick=${e => e.stopPropagation()}>
            <div class="modal-head">
              <h3>Exporter ${(active || "").replace(/\.csv$/, "")}</h3>
              <button class="icon-btn" title="Fermer" disabled=${!!exporting} onClick=${() => setExportOpen(false)}>✕</button>
            </div>
            <p class="modal-sub">${rows.length} ligne${rows.length === 1 ? "" : "s"} · ${cols.length} colonne${cols.length === 1 ? "" : "s"}. Choisis un format.</p>
            <div class="export-opts">
              <button class="export-opt" disabled=${!!exporting} onClick=${() => doExport("csv")}>
                <span class="fmt">${exporting === "csv" ? "Export…" : "CSV"}</span>
                <span class="fmt-desc">Texte brut, compatible tous tableurs</span>
              </button>
              <button class="export-opt" disabled=${!!exporting} onClick=${() => doExport("xlsx")}>
                <span class="fmt">${exporting === "xlsx" ? "Export…" : "XLSX"}</span>
                <span class="fmt-desc">Classeur Excel natif</span>
              </button>
            </div>
          </div>
        </div>`}
    </div>`;
}

createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
